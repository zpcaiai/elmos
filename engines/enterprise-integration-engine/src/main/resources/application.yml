server:
  port: ${ELMOS_ENTERPRISE_INTEGRATION_PORT:8094}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  application:
    name: elmos-enterprise-integration-engine
  lifecycle:
    timeout-per-shutdown-phase: ${ELMOS_SHUTDOWN_TIMEOUT:30s}
  mvc:
    problemdetails:
      enabled: true
management:
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
