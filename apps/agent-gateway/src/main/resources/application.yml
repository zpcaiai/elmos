server:
  port: ${ELMOS_AGENT_GATEWAY_PORT:8083}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  application:
    name: elmos-agent-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  lifecycle:
    timeout-per-shutdown-phase: ${ELMOS_SHUTDOWN_TIMEOUT:30s}
  mvc:
    problemdetails:
      enabled: true
management:
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
