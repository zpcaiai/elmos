server:
  port: ${ELMOS_ENGINE_PORT:8081}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  application:
    name: elmos-java-engine-worker
  lifecycle:
    timeout-per-shutdown-phase: ${ELMOS_SHUTDOWN_TIMEOUT:30s}
  mvc:
    problemdetails:
      enabled: true
management:
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
elmos:
  worker:
    workspace-root: ${ELMOS_WORKSPACE_ROOT:/workspace}
    osv:
      enabled: ${ELMOS_OSV_ENABLED:false}
      api-base: ${ELMOS_OSV_API_BASE:https://api.osv.dev/}
