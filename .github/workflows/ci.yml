name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java reactor
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify Maven reactor
        run: mvn -B -ntp verify

  dotnet-engine:
    name: .NET Engine
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: engines/dotnet-engine/**/packages.lock.json
      - name: Restore locked dependencies
        run: dotnet restore engines/dotnet-engine/Elmos.Dotnet.slnx --locked-mode
      - name: Test .NET Engine
        run: dotnet test engines/dotnet-engine/Elmos.Dotnet.slnx --configuration Release --no-restore

  python-engine:
    name: Python Engine
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Install locked uv tool
        run: python -m pip install --disable-pip-version-check uv==0.11.16
      - name: Test and type-check Python Engine
        run: |
          uv --directory engines/python-engine run --locked pytest
          uv --directory engines/python-engine run --locked ruff check src tests
          uv --directory engines/python-engine run --locked mypy src

  frontend-client-engine:
    name: Frontend Client Engine
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Set up Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
      - name: Install locked pnpm tool
        run: npm install --global pnpm@10.12.4
      - name: Install locked dependencies
        run: pnpm --dir engines/frontend-client-engine install --frozen-lockfile
      - name: Test Frontend Client Engine
        run: pnpm --dir engines/frontend-client-engine check

  project-synthesis:
    name: Project Synthesis and operability
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked uv tool
        run: python -m pip install --disable-pip-version-check uv==0.11.16
      - name: Verify Project Synthesis
        working-directory: engines/project-synthesis-engine
        run: |
          uv sync --locked
          uv run pytest
          uv run ruff check src tests
          uv run mypy src
      - name: Verify service operability contracts
        run: |
          uv run --with pyyaml python tooling/validate_runtime_operability.py
          uv run --with pyyaml python -m unittest discover -s tests/production-readiness -p 'test_*.py'
      - name: Verify Batch 45 fail-closed toolkit
        run: |
          uv run --with 'jsonschema>=4.23' --with pyyaml python scripts/mature_product_toolkit.py validate --batch 45
          uv run --with 'jsonschema>=4.23' --with pyyaml python -m unittest discover -s tests/batch45 -p 'test_*.py'
      - name: Verify Batch 97-104 Skill distribution
        run: make batch97-104-skills

  web-console:
    name: Web Console
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Set up Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install locked pnpm tool
        run: npm install --global pnpm@10.12.4
      - name: Install dependencies
        run: pnpm --dir apps/web-console install --frozen-lockfile
      - name: Type-check and build
        run: pnpm --dir apps/web-console check
